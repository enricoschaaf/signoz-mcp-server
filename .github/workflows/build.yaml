name: build
on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  binary:
    runs-on: ubuntu-latest
    steps:
      - name: self-checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: go-install
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: run-goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
